# smtp-wg-tunnel — client configuration
# Run: python client.py -c client_config.yaml

client:
  # Server FQDN — must match the certificate CN/SAN exactly.
  server_host: "mail.yourserver.duckdns.org"
  server_port: 587

  # Local UDP socket that WireGuard will send packets to.
  # Set Endpoint = 127.0.0.1:51820 in your WireGuard [Peer] block.
  local_wg_host: "127.0.0.1"
  local_wg_port: 51820

  # Credentials — must match an entry in the server's users.yaml.
  username: "youruser"
  secret:   "CHANGE-ME-replace-with-your-secret-from-server"

  # Path to ca.crt copied from the server.
  # Strongly recommended — prevents MITM attacks.
  # Set to null to disable verification (insecure).
  ca_cert: "ca.crt"

  # Seconds to wait before reconnecting after a dropped tunnel.
  reconnect_delay: 5
